<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Documentation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-color: #1a1a2e;
            --sidebar-bg: rgba(240, 240, 240, 0.6);
            --border-color: rgba(26, 26, 46, 0.15);
            --code-bg: rgba(26, 26, 46, 0.03);
            --accent-color: #60a5fa;
            --hover-bg: rgba(96, 165, 250, 0.1);
            --callout-info-bg: rgba(96, 165, 250, 0.08);
            --callout-warn-bg: rgba(251, 191, 36, 0.1);
            --callout-warn-border: #fbbf24;
            
            --font-serif: "Noto Serif JP", "Noto Serif", serif;
            --font-sans: "Noto Sans JP", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
            
            --sidebar-width: 300px;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #f9f9f9;
            --sidebar-bg: rgba(15, 15, 25, 0.8);
            --border-color: rgba(249, 249, 249, 0.15);
            --code-bg: rgba(249, 249, 249, 0.05);
            --callout-info-bg: rgba(96, 165, 250, 0.15);
            --callout-warn-bg: rgba(251, 191, 36, 0.15);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-serif);
            -webkit-font-smoothing: antialiased;
            display: flex; height: 100vh; overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            width: var(--sidebar-width); background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color); height: 100%;
            overflow-y: auto; padding: 2rem 1.5rem; box-sizing: border-box;
            font-family: var(--font-sans);
        }
        .sidebar-header {
            font-family: var(--font-serif); font-size: 1.5rem;
            letter-spacing: 0.1em; margin-bottom: 2rem;
        }
        .nav-tree { list-style: none; padding: 0; margin: 0; }
        .nav-tree li { margin-bottom: 0.5rem; }
        .nav-tree a {
            text-decoration: none; color: var(--text-color); opacity: 0.7;
            font-size: 0.95rem; display: block; padding: 0.4rem 0.8rem;
            border-radius: 6px; transition: all 0.2s;
        }
        .nav-tree a:hover { opacity: 1; background-color: var(--hover-bg); }
        .nav-tree a.active {
            opacity: 1; background-color: var(--hover-bg);
            color: var(--accent-color); font-weight: bold;
        }

        .main-content {
            flex: 1; height: 100%; overflow-y: auto; padding: 3rem 10%;
            box-sizing: border-box; position: relative;
        }
        .top-utils { position: absolute; top: 2rem; right: 4rem; z-index: 10; }
        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-color); padding: 0.5rem 1rem; border-radius: 20px;
            cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem;
        }
        .theme-toggle:hover { background: var(--text-color); color: var(--bg-color); }

        #content-area h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.1em; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 2rem; }
        #content-area h2, #content-area h3 { font-weight: 400; margin-top: 3rem; letter-spacing: 0.05em; }
        #content-area p { line-height: 1.8; letter-spacing: 0.03em; opacity: 0.9; }
        #content-area pre { background-color: var(--code-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); font-family: var(--font-mono); overflow-x: auto; position: relative; }
        #content-area code { font-family: var(--font-mono); }
        
        .meta-info { display: flex; gap: 1rem; margin-bottom: 2rem; font-family: var(--font-sans); font-size: 0.8rem; }
        .badge { padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--border-color); opacity: 0.8; }
        
        .callout { display: flex; gap: 1rem; padding: 1.2rem 1.5rem; border-radius: 8px; margin: 2rem 0; font-family: var(--font-sans); font-size: 0.95rem; line-height: 1.6; }
        .callout .icon { font-size: 1.2rem; }
        .callout.info { background-color: var(--callout-info-bg); border-left: 4px solid var(--accent-color); }
        .callout.warning { background-color: var(--callout-warn-bg); border-left: 4px solid var(--callout-warn-border); }

        .dict-word {
            text-decoration: underline; text-decoration-style: dotted;
            text-decoration-color: var(--accent-color); text-underline-offset: 4px;
            cursor: help; transition: color 0.2s;
        }
        .dict-word:hover { color: var(--accent-color); }

        #tooltip {
            position: absolute; background: var(--text-color); color: var(--bg-color);
            padding: 1rem; border-radius: 8px; font-family: var(--font-sans);
            font-size: 0.85rem; width: max-content; max-width: 250px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none;
            opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; z-index: 1000;
        }
        #tooltip.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        #tooltip .title { font-weight: bold; margin-bottom: 0.3rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.3rem; }
        #tooltip a.btn { display: inline-block; background: var(--accent-color); color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Water Docs</div>
        <ul class="nav-tree">
            <li><a href="#index" class="nav-link">はじめに</a></li>
            <li>
                <div style="padding: 0.4rem 0.8rem; font-size: 0.95rem; opacity: 0.5;">基礎構文</div>
                <ul class="nav-tree" style="padding-left: 1rem;">
                    <li><a href="#basics/variables" class="nav-link">変数 - 基礎</a></li>
                    <li><a href="#basics/control-flow" class="nav-link">制御構文</a></li>
                </ul>
            </li>
            <li><a href="#packages" class="nav-link">パッケージ管理</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="top-utils">
            <button class="theme-toggle" onclick="toggleTheme()">Dark Mode</button>
        </div>

        <div id="content-area">
            <p style="text-align:center; opacity:0.5; margin-top: 20vh;">読み込み中...</p>
        </div>
    </main>

    <div id="tooltip">
        <div class="title" id="tt-title"></div>
        <div class="desc" id="tt-desc"></div>
        <a href="#" class="btn" id="tt-link">詳細を読む</a>
    </div>

    <script>
        const contentArea = document.getElementById('content-area');

        function toggleTheme() {
            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            const btn = document.querySelector('.theme-toggle');
            if (currentTheme === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = 'Dark Mode';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = 'Light Mode';
            }
        }

        async function loadMarkdown(path) {
            if (!path) path = 'index';
            
            try {
                const response = await fetch(`docs/${path}.md`);
                if (!response.ok) throw new Error('File not found');
                
                let text = await response.text();
                text = text.replace(/:::version\n([\s\S]*?)\n:::/g, 
                    '<div class="meta-info"><div class="badge">$1</div></div>');
          
                text = text.replace(/:::info\n([\s\S]*?)\n:::/g, 
                    '<div class="callout info"><span class="icon">ℹ️</span><div><strong>補足情報:</strong><br>$1</div></div>');
                text = text.replace(/:::warning\n([\s\S]*?)\n:::/g, 
                    '<div class="callout warning"><span class="icon">💡</span><div><strong>注意点:</strong><br>$1</div></div>');
            
                text = text.replace(/\{\{([^|]+)\|([^|]+)\|([^}]+)\}\}/g, 
                    '<span class="dict-word" data-word="$1" data-desc="$2" data-link="$3">$1</span>');
                contentArea.innerHTML = marked.parse(text);
                setupTooltips();
                updateSidebarActive(path);
                document.querySelector('.main-content').scrollTop = 0;

            } catch (error) {
                contentArea.innerHTML = `
                    <h1>404 Not Found</h1>
                    <p>指定されたドキュメント (<code>docs/${path}.md</code>) が見つかりませんでした。</p>
                    <p style="opacity:0.6; font-size:0.9rem;">※ローカルで開いている場合、ブラウザのセキュリティ(CORS)によりファイルが読み込めない可能性があります。VSCodeの「Live Server」などのローカルサーバー経由で開いてください。</p>
                `;
            }
        }

        function updateSidebarActive(path) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${path}`) {
                    link.classList.add('active');
                }
            });
        }

        function setupTooltips() {
            const tooltip = document.getElementById('tooltip');
            const titleEl = document.getElementById('tt-title');
            const descEl = document.getElementById('tt-desc');
            const linkEl = document.getElementById('tt-link');
            
            document.querySelectorAll('.dict-word').forEach(word => {
                word.addEventListener('mouseenter', (e) => {
                    const rect = e.target.getBoundingClientRect();
                    titleEl.textContent = e.target.getAttribute('data-word');
                    descEl.textContent = e.target.getAttribute('data-desc');
                    linkEl.href = e.target.getAttribute('data-link');
                    
                    tooltip.style.left = `${rect.left + window.scrollX}px`;
                    tooltip.style.top = `${rect.bottom + window.scrollY + 8}px`;
                    tooltip.classList.add('show');
                });

                word.addEventListener('mouseleave', () => {
                    setTimeout(() => {
                        if (!tooltip.matches(':hover')) {
                            tooltip.classList.remove('show');
                        }
                    }, 100);
                });
            });

            tooltip.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        }

        window.addEventListener('hashchange', () => {
            const path = window.location.hash.slice(1);
            loadMarkdown(path);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const initialPath = window.location.hash.slice(1) || 'index';
            loadMarkdown(initialPath);
        });
    </script>
</body>
</html>
