<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;URL='https://www.patreon.com'">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ddd;
            border-top: 3px solid #555;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        p {
            font-size: 14px;
            letter-spacing: 0.1em;
            font-weight: 300;
        }
        a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            transition: 0.3s;
        }
        a:hover {
            color: #333;
            border-bottom-color: #333;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>Loading experience...<br>
           <small>自動で移動しない場合は<a href="https://www.patreon.com">こちら</a></small>
        </p>
    </div>
</body>
</html>
